name = "proxy-coordinator"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Wrangler infers `workers_dev = false` whenever `[[routes]]` is present unless
# you set this explicitly — keep the `*.workers.dev` URL active in parallel.
workers_dev = true

# Public hostname on the wu.engineer zone (Custom Domain — Wrangler provisions
# DNS + edge TLS on deploy; zone must live in this Cloudflare account).
[[routes]]
pattern = "proxy-coordinator.wu.engineer"
custom_domain = true

# SQLite-backed Durable Object classes.  Required on the Workers Free plan
# (only SQLite-backed DOs are available there; KV-backed DOs require Paid).
[[durable_objects.bindings]]
name = "PROXY_DO"
class_name = "ProxyCoordinator"

# Singleton DO that arbitrates JavDB login state across multiple GH Actions
# runners.  Addressed by `idFromName("global")` so every runner converges on
# the same instance.  See src/global_login_state.ts.
[[durable_objects.bindings]]
name = "GLOBAL_LOGIN_STATE_DO"
class_name = "GlobalLoginState"

# Per-day-sharded DO that arbitrates JavDB detail-page fetches across multiple
# GH Actions runners.  Addressed by `idFromName("YYYY-MM-DD")` so a single
# day's claims live in one DO instance and old shards naturally evict via
# the Cloudflare DO LRU.  See src/movie_claim_state.ts.
[[durable_objects.bindings]]
name = "MOVIE_CLAIM_DO"
class_name = "MovieClaimState"

# Singleton runner-registry DO (P2-E).  Tracks live spider runners across
# GH Actions workflow runs for ops visibility + proxy_pool_hash drift
# detection (which subsumes the originally-planned P3-B drift DO).
# Addressed by `idFromName("runners")`.  See src/runner_registry.ts.
[[durable_objects.bindings]]
name = "RUNNER_REGISTRY_DO"
class_name = "RunnerRegistry"

# W5.3 — singleton config DO. Holds operator-tunable runtime parameters
# (throttle windows, ban TTLs, heartbeat interval, ...) that runners pull
# on every register / heartbeat response. Addressed by
# `idFromName("global-config")`. See src/config_state.ts.
[[durable_objects.bindings]]
name = "CONFIG_STATE_DO"
class_name = "ConfigState"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProxyCoordinator"]

# v2 introduces the GlobalLoginState class.  Wrangler applies migrations in
# tag order; never reorder or delete v1 — that would re-create the per-proxy
# DO from scratch and lose its persisted throttle history.
[[migrations]]
tag = "v2"
new_sqlite_classes = ["GlobalLoginState"]

# v3 introduces both the MovieClaimState (P1-B) and RunnerRegistry (P2-E)
# classes — wrangler accepts multiple classes per migration tag, so a single
# `wrangler deploy` rolls both out atomically.  Append only — never edit
# the array in-place once deployed (would re-create the DOs from scratch
# and lose persisted state).  Future P2-A schema additions live inside
# MovieClaimState's storage layout and do not require a new migration.
[[migrations]]
tag = "v3"
new_sqlite_classes = ["MovieClaimState", "RunnerRegistry"]

# v4 — W5.3 ConfigState singleton. Stores operator-tunable runtime
# parameters and surfaces them on every register / heartbeat response.
[[migrations]]
tag = "v4"
new_sqlite_classes = ["ConfigState"]

# Workers Analytics Engine for per-lease metrics (free tier: 100k data points/day).
#
# DISABLED BY DEFAULT because Analytics Engine requires a one-time
# manual opt-in in the Cloudflare Dashboard before any Worker can bind
# to it.  Without that opt-in `wrangler deploy` fails with:
#   "You need to enable Analytics Engine. Head to the Cloudflare Dashboard..."
#
# To enable observability:
#   1. Open the URL printed in the deploy error (or
#      https://dash.cloudflare.com/<account-id>/workers/analytics-engine )
#      and click "Enable Analytics Engine".
#   2. Uncomment the block below.
#   3. Re-run `npx wrangler deploy`.
#
# The Worker's analytics writes are guarded by `if (!env.LEASE_ANALYTICS)`
# so leaving this commented out has zero functional impact — only the
# `proxy_coordinator_leases` dataset is unavailable for observability.
[[analytics_engine_datasets]]
binding = "LEASE_ANALYTICS"
dataset = "proxy_coordinator_leases"

# Workers Logs (observability)
[observability]
enabled = true
head_sampling_rate = 1.0

# `wrangler dev` exposes the Worker on http://localhost:8787 by default.
# Logs are streamed to the terminal; use `--local` for full in-memory mode
# (no Cloudflare account / API token required).
[dev]
port = 8787

# Optional vars (non-secret).  Tuning the throttle windows here lets ops
# adjust limits without redeploying client code.  Defaults match the Python
# `TripleWindowThrottle` (30s/3, 300s/30, 1800s/200) and the Penalty TIERS
# (1→1.30, 2→1.65, 4→2.00).
[vars]
SHORT_WINDOW_SEC = "30"
SHORT_MAX = "3"
LONG_WINDOW_SEC = "300"
LONG_MAX = "30"
EXTRA_WINDOW_SEC = "1800"
EXTRA_MAX = "200"
PENALTY_WINDOW_SEC = "300"
JITTER_MAX_MS = "500"
# P1-A — default ban duration (3 days). Override per-deploy without
# touching client code.  Clients may also pass `ttl_ms` per /report, in
# which case this fallback is unused.
BAN_TTL_MS = "259200000"
# P1-B — default per-claim TTL for MovieClaimState (30 min).  Sized to
# cover detail-page fetch + parser + qB add for a slow proxy without
# locking the slot if the runner crashes (DO Alarm GC sweeps stale
# claims every 10 min regardless).
MOVIE_CLAIM_TTL_MS = "1800000"
# P2-E — staleness threshold for RunnerRegistry GC.  Runners whose
# `last_heartbeat` is older than this are evicted by the singleton DO's
# 5 min alarm.  10 min default = 5x the canonical 60 s heartbeat cadence
# so a single missed heartbeat doesn't evict a healthy runner.  Server
# floors the value at 60 s defensively if a typo is set here.
RUNNER_STALE_TTL_MS = "600000"
# Minimum live-runner count at which the registry recommends enabling
# the per-day MovieClaim mutex.  Used by RunnerRegistry to derive the
# `movie_claim_recommended` flag returned on every register / heartbeat
# response — Python clients in `auto` mode follow this signal to mount /
# unmount their MovieClaimClient automatically.  Default 2: a single
# runner doesn't benefit from claim coordination; two or more runners do.
MOVIE_CLAIM_MIN_RUNNERS = "2"
# P2-C — login attempt cooldown knobs (cross-runner login budget).
# Counted within `LOGIN_COOLDOWN_WINDOW_SEC`; once recent FAILURES reach
# `LOGIN_COOLDOWN_THRESHOLD`, `acquire_lease` returns a non-zero
# `cooldown_until_ms` (still grants the lease — caller parks its login
# flow until the cooldown expires).  Defaults: 5 failures / hour →
# 30 min cooldown.  Override per-deploy without touching client code.
LOGIN_COOLDOWN_THRESHOLD = "5"
LOGIN_COOLDOWN_WINDOW_SEC = "3600"
LOGIN_COOLDOWN_DURATION_MS = "1800000"
# W5.6 — Worker-level token-bucket rate limit. Caps authorised requests
# per minute per Bearer token to guard against burst abuse from a single
# runner. State is per-Worker-isolate and resets on cold start; not a
# strict SLO but enough to catch runaway clients. Default 1000/min ≈
# 16.7 req/s, well above the spider's typical sustained rate (one
# detail-page lease every 10 s × 5 workers = 0.5 req/s).
# Set to "0" to disable (e.g. in load tests).
WORKER_RATE_LIMIT_PER_MIN = "1000"

# Secrets (set via `wrangler secret put`):
#   PROXY_COORDINATOR_TOKEN — bearer token required on every /lease, /report
